<?xml version="1.0" encoding="utf-8" ?>
<configuration>
  <configSections>
    <section name="launchNet7" type="LaunchNet7.Configuration.LauncherConfigurationSection, LaunchNet7" />
  </configSections>

  <launchNet7 defaultWebsite="">

    <!--
      Auto-update is intentionally not configured. The launcher's auto-update
      machinery is dormant in this build; the operator updates the proxy and
      server binaries out of band.
    -->

    <servers>

      <!--
        The <host hostname="..."/> entry is the *upstream* the local proxy
        will forward to. The client itself only ever talks to localhost — it
        never opens a TCP/UDP connection to the upstream directly. Leave the
        upstream blank (or set it to your own server) to take the proxy's
        NET7_UPSTREAM_HOST env var / built-in default.
      -->

      <server name="NET7SP" displayName="Single-Player (local server)" isSinglePlayer="true">
        <host hostname="localhost" />
      </server>

      <server name="Net7MP" displayName="Multi-Player">
        <host hostname="" />
      </server>

      <!--
        Net7Local: multiplayer launch path (proxy + client, no Net7.exe)
        pointed at the local docker-compose dev stack. This is what
        `just play-local` selects. The proxy binds 127.0.0.1; the
        upstream is taken from NET7_UPSTREAM_HOST (also set to
        localhost by the just recipe).
      -->
      <server name="Net7Local" launchName="Net7MP"
              displayName="Local dev stack (docker compose)">
        <host hostname="localhost" secureAuthenticationPort="4443" />
      </server>

      <server name="Net7SPCustom" launchName="Net7SP"
              displayName="Single-Player (Custom)"
              isSinglePlayer="true"
              enableAdvancedSettings="true">
        <host hostname="localhost" />
      </server>

      <server name="Net7MPCustom" launchName="Net7MP"
              displayName="Multi-Player (Custom)"
              enableAdvancedSettings="true">
        <host hostname="" />
      </server>

    </servers>

  </launchNet7>

</configuration>