# docker-compose.yml
#
# Phase J dev stack: the running game server.
#
# Topology:
#   mysql  -- holds net7 (content) and net7_user (accounts)
#   server -- the C++ Net-7 game server, talks to mysql
#   login  -- Net7SSL TCP auth server, talks to mysql (Phase J WIP)
#
# Postgres + pgloader live behind the `postgres` profile and are the
# long-term Phase C target (mysqlclient -> libpqxx port). MySQL is the
# short path because the 2010 dumps + the embedded SQL are MySQL-native.

name: enb-emulator

services:
  mysql:
    # mysql:8.0 is the closest LTS to what the 2010 codebase was written
    # against. Strict-mode is loosened via command flags so 2010-vintage
    # INSERTs don't fail on default values / implicit conversions.
    image: mysql:8.0
    command:
      - --character-set-server=latin1
      - --collation-server=latin1_swedish_ci
      - --sql-mode=NO_ENGINE_SUBSTITUTION
      - --default-authentication-plugin=mysql_native_password
      - --innodb-flush-log-at-trx-commit=2
    environment:
      MYSQL_ROOT_PASSWORD: net7root
      MYSQL_USER: net7
      MYSQL_PASSWORD: net7
      # Pre-create something so the mysql image is happy; the real DBs
      # are created by 00-create-databases.sql in init/.
      MYSQL_DATABASE: _bootstrap
    ports:
      - "3307:3306"
    volumes:
      - mysqldata:/var/lib/mysql
      - ./db/mysql/init:/docker-entrypoint-initdb.d:ro
      - ./db/mysql:/dumps:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-unet7", "-pnet7"]
      interval: 5s
      timeout: 3s
      retries: 30
      start_period: 60s
    restart: unless-stopped

  server:
    build:
      # Phase R: build context is the repo root so the Dockerfile can
      # COPY common/ (shared protocol headers + net7ipc::PosixIpc) in
      # addition to server/.
      context: .
      dockerfile: server/Dockerfile
    depends_on:
      mysql:
        condition: service_healthy
      # Phase J: the login container's entrypoint chmod's the shared
      # /run/net7-ipc volume to 0777 (server runs as net7:net7 uid 999
      # and otherwise can't bind a datagram socket in the root-owned
      # volume dir). Start order matters; wait for login to be up.
      login:
        condition: service_started
    environment:
      # Net7Config.cfg is the file the server actually reads on boot
      # (server/src/Net7.cpp:124). We mount one in via volumes:.
      TZ: UTC
    # The server resolves g_DomainName via gethostbyname(); in docker we
    # remap local.net-7.org to the container's loopback so it succeeds
    # without external DNS.
    extra_hosts:
      - "local.net-7.org:127.0.0.1"
    volumes:
      - ./deploy/Net7Config.cfg:/app/Net7Config.cfg:ro
      # SSL_Listener.cpp:56-57 reads "<g_DomainName>.cer" and "<g_DomainName>.pem"
      # from CWD. Certs are generated into deploy/certs by `just gen-certs`.
      - ./deploy/certs/local.net-7.org.cer:/app/local.net-7.org.cer:ro
      - ./deploy/certs/local.net-7.org.pem:/app/local.net-7.org.pem:ro
      # SERVER_DATABASE_PATH (Net7.h:143) = "../database/" relative to CWD.
      # With WORKDIR=/app, that resolves to /database/.
      - ./server/data:/database:ro
      # Phase J IPC: AF_UNIX SOCK_DGRAM peer sockets live here. The login
      # service mounts the same named volume so the two processes can see
      # each other's sockets without going through the network.
      - net7-ipc:/run/net7-ipc
    ports:
      # Net-7 listens on:
      # - 3501-3800 TCP (sector servers; allocated dynamically)
      # - 3808 UDP (master <-> proxy)
      # Note: 3801 (master) and 3805 (global) are owned by the `proxy`
      # service (Net7Proxy), not this server. The server reaches the
      # proxy over the same docker network when needed.
      - "3501-3550:3501-3550/tcp"
      - "3808:3808/udp"
    restart: unless-stopped

  # --------------------------------------------------------------
  # Net7Proxy server-side TCP listener (Phase J).
  # Binds 3801 (MASTER_SERVER_PORT) for the Westwood RSA+RC4 client
  # handshake, plus 3805 (GLOBAL_SERVER_PORT). The 9.5K LOC of original
  # client-launcher logic under proxy/ is `#ifdef WIN32`-gated and
  # compiles to nothing on Linux; the Linux build path is a thin
  # ServerManager + TcpListener that accepts connections and (today)
  # drops them after logging the peer IP. Handshake + downstream
  # dispatch is the next pass.
  # --------------------------------------------------------------
  proxy:
    build:
      # Phase R: build context is the repo root so the Dockerfile can
      # COPY common/ in addition to proxy/.
      context: .
      dockerfile: proxy/Dockerfile
    depends_on:
      mysql:
        condition: service_healthy
    extra_hosts:
      - "local.net-7.org:127.0.0.1"
    ports:
      - "3801:3801/tcp"
      - "3805:3805/tcp"
      # Phase K: SECTOR_SERVER_PORT — second-stage connect target the
      # client hits after MasterJoin returns a ServerRedirect. Same
      # Connection ctor / handshake / framed-dispatch path as 3801/3805,
      # routed with m_ServerType=CLIENT_TO_SECTOR_SERVER.
      - "3500:3500/tcp"
    restart: unless-stopped

  # --------------------------------------------------------------
  # Net7SSL server-side TLS authentication listener (Phase J).
  # Binds 443 (SSL_PORT) — the Westwood SSL auth handshake the
  # client speaks first. The WIN32-only Connection/MailManager/MySQL
  # tree under login-server/Net7SSL/ is walled at source level; the
  # Linux path drives SSL_accept() inline and closes. Opcode
  # dispatch / account lookup are the next pass.
  # --------------------------------------------------------------
  login:
    build:
      # Phase R: build context is the repo root so the Dockerfile can
      # COPY common/ in addition to login-server/.
      context: .
      dockerfile: login-server/Dockerfile
    depends_on:
      mysql:
        condition: service_healthy
    extra_hosts:
      - "local.net-7.org:127.0.0.1"
    environment:
      # Phase J: LinuxAuth.cpp reads these to talk to the MySQL container.
      # Defaults are baked into the binary; env overrides make swapping
      # the backing DB straightforward in CI / staging.
      MYSQL_HOST: "mysql:3306"
      MYSQL_USER: "net7"
      MYSQL_PASS: "net7"
      MYSQL_DB: "net7_user"
    volumes:
      # SSL_Listener.cpp reads "<g_DomainName>.cer" and "<g_DomainName>.pem"
      # from CWD; the same certs the server container uses also work here.
      - ./deploy/certs/local.net-7.org.cer:/app/local.net-7.org.cer:ro
      - ./deploy/certs/local.net-7.org.pem:/app/local.net-7.org.pem:ro
      # Phase J IPC: shares the AF_UNIX SOCK_DGRAM sockets with the server
      # container (Net7SSL writes /run/net7-ipc/net7.sock,
      # reads /run/net7-ipc/net7SSL.sock; server is the mirror).
      - net7-ipc:/run/net7-ipc
    # The login container runs as root; we use that to chmod the shared
    # /run/net7-ipc volume to 0777 before exec'ing net7ssl, so the
    # server container (running as net7:net7, uid 999) can also bind a
    # datagram socket there. Same-host trust model — see posix_ipc.h.
    entrypoint:
      - /bin/sh
      - -c
      - |
        mkdir -p /run/net7-ipc
        chmod 0777 /run/net7-ipc
        exec /app/net7ssl
    ports:
      # Container binds 443 internally (the protocol-correct port). The
      # host side is remapped to 4443 so the stack works under rootless
      # docker, which forbids publishing host ports < 1024. For prod, set
      # `sysctl net.ipv4.ip_unprivileged_port_start=443` on the host and
      # change the left side to 443.
      - "4443:443/tcp"
    restart: unless-stopped

  # --------------------------------------------------------------
  # Opt-in: phpMyAdmin against the mysql container.
  # docker compose --profile dev-tools up phpmyadmin
  # --------------------------------------------------------------
  phpmyadmin:
    profiles: ["dev-tools"]
    image: phpmyadmin:latest
    environment:
      PMA_HOST: mysql
      PMA_USER: net7
      PMA_PASSWORD: net7
    ports:
      - "8081:80"
    depends_on:
      - mysql
    restart: unless-stopped

  # --------------------------------------------------------------
  # Phase C continuation: Postgres backend. Kept behind a profile so
  # the default stack stays MySQL until the libpqxx port lands.
  # docker compose --profile postgres up postgres schema-init
  # --------------------------------------------------------------
  postgres:
    profiles: ["postgres"]
    image: postgres:16
    environment:
      POSTGRES_USER: net7
      POSTGRES_PASSWORD: net7
      POSTGRES_DB: net7
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U net7 -d net7"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  schema-init:
    profiles: ["postgres"]
    image: postgres:16
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PGPASSWORD: net7
    volumes:
      - ./db/postgres:/db:ro
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        set -e
        echo "schema-init: applying /db/schema.sql"
        psql -h postgres -U net7 -d net7 -v ON_ERROR_STOP=1 -f /db/schema.sql
        if [ -f /db/seed.sql ]; then
          echo "schema-init: applying /db/seed.sql"
          psql -h postgres -U net7 -d net7 -v ON_ERROR_STOP=0 -f /db/seed.sql || true
        fi
        echo "schema-init: done"
    restart: "no"

  pgadmin:
    profiles: ["dev-tools-postgres"]
    image: dpage/pgadmin4:latest
    environment:
      PGADMIN_DEFAULT_EMAIL: dev@localhost
      PGADMIN_DEFAULT_PASSWORD: net7
      PGADMIN_CONFIG_SERVER_MODE: "False"
    ports:
      - "8080:80"
    depends_on:
      - postgres
    restart: unless-stopped

volumes:
  mysqldata:
  pgdata:
  # Phase J IPC: shared AF_UNIX SOCK_DGRAM socket directory between the
  # server and login containers. Replaces the Win32 mailslot pair.
  net7-ipc:
