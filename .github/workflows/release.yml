name: release

# Tag-triggered image build + push to GHCR. Scaffolding — the server
# image build will currently fail end-to-end (Phase B is best-effort),
# so this workflow is wired but not enforcing.

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read
  packages: write

jobs:

  images:
    name: build + push images
    runs-on: ubuntu-24.04
    continue-on-error: true
    strategy:
      fail-fast: false
      matrix:
        component:
          - { name: "server", context: "./server" }
          - { name: "login",  context: "./login-server" }
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}/${{ matrix.component.name }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest

      - name: Build + push
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.component.context }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.component.name }}
          cache-to:   type=gha,scope=${{ matrix.component.name }},mode=max
