name: build

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:

  lint-plans:
    name: lint-plans
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Plans directory + master status table exist
        run: |
          set -euo pipefail
          test -d plans
          ls plans/00-master.md plans/01-phase-a-merge.md plans/02-phase-b-linux-server.md
          grep -q "^## Status table" plans/00-master.md

  check-no-mojibake:
    name: check-no-mojibake (license-header guard)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: No U+FFFD replacement chars in tracked source
        run: bash tools/check_no_mojibake.sh

  cmake-configure:
    name: cmake-configure (server, ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    continue-on-error: true
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, ubuntu-22.04]
    steps:
      - uses: actions/checkout@v4
      - name: Install build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            g++ cmake ninja-build pkg-config \
            libssl-dev liblua5.4-dev liblua5.4-0 \
            libtinyxml-dev libcrypto++-dev \
            libpq-dev libpqxx-dev
      - name: Configure
        run: cmake -S server -B build/server -G Ninja
      - name: Upload CMake logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cmake-configure-logs-${{ matrix.os }}
          path: |
            build/server/CMakeFiles/CMakeOutput.log
            build/server/CMakeFiles/CMakeError.log
          if-no-files-found: ignore

  cmake-build:
    name: cmake-build (server, ${{ matrix.os }})
    needs: cmake-configure
    runs-on: ${{ matrix.os }}
    continue-on-error: true
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, ubuntu-22.04]
    steps:
      - uses: actions/checkout@v4
      - name: Install build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            g++ cmake ninja-build pkg-config \
            libssl-dev liblua5.4-dev liblua5.4-0 \
            libtinyxml-dev libcrypto++-dev \
            libpq-dev libpqxx-dev
      - name: Configure
        run: cmake -S server -B build/server -G Ninja
      - name: Build (best-effort; captures BUILD_ERRORS.md + WARNINGS.txt)
        run: |
          set +e
          cmake --build build/server -j"$(nproc)" 2>&1 | tee server/BUILD_ERRORS.md
          echo "build exit: $?"
          # Phase F continuation: extract just the -W warnings as a
          # separate artifact so the count + distribution is trackable
          # over time without trawling the full build log.
          grep -E "warning: .*\[-W" server/BUILD_ERRORS.md > server/WARNINGS.txt || true
          wc -l server/WARNINGS.txt
      - name: Upload BUILD_ERRORS.md
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: server-build-errors-${{ matrix.os }}
          path: server/BUILD_ERRORS.md
          if-no-files-found: ignore
      - name: Upload WARNINGS.txt
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: server-warnings-${{ matrix.os }}
          path: server/WARNINGS.txt
          if-no-files-found: ignore

  db-schema:
    name: db-schema (postgres apply)
    runs-on: ubuntu-24.04
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: net7
          POSTGRES_PASSWORD: net7
          POSTGRES_DB: net7
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U net7 -d net7"
          --health-interval=5s
          --health-timeout=3s
          --health-retries=10
    steps:
      - uses: actions/checkout@v4
      - name: Install psql
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends postgresql-client
      - name: Convert MySQL schema -> Postgres
        run: bash db/postgres/convert.sh
      - name: Apply schema
        env:
          PGPASSWORD: net7
        run: |
          psql -h 127.0.0.1 -U net7 -d net7 -v ON_ERROR_STOP=1 \
               -f db/postgres/schema.sql

  dotnet-build:
    name: dotnet-build (tools)
    runs-on: ubuntu-24.04
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - name: Install .NET 10 SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
      - name: Build tool suite
        run: dotnet build tools/Net7Tools.slnx

  ctest:
    name: ctest (gtest harness)
    runs-on: ubuntu-24.04
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: net7
          POSTGRES_PASSWORD: net7
          POSTGRES_DB: net7
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U net7 -d net7"
          --health-interval=5s
          --health-timeout=3s
          --health-retries=10
    steps:
      - uses: actions/checkout@v4
      - name: Install build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            g++ cmake ninja-build pkg-config libpq-dev libssl-dev
      - name: Configure
        run: cmake -S tests -B build/tests -G Ninja
      - name: Build
        run: cmake --build build/tests -j"$(nproc)"
      - name: Test
        env:
          NET7_TEST_DB_DSN: "host=127.0.0.1 user=net7 password=net7 dbname=net7"
        run: ctest --test-dir build/tests --output-on-failure

  installer-shellcheck:
    name: installer-shellcheck
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Install shellcheck
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends shellcheck
      - name: Lint installer
        run: shellcheck client/linux-installer/install-enb-linux.sh

  integration-test:
    name: integration-test (live proxy handshake)
    runs-on: ubuntu-24.04
    needs: ctest
    steps:
      - uses: actions/checkout@v4
      - name: Install build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            g++ cmake ninja-build pkg-config libssl-dev
      - name: Build Net7Proxy docker image
        # Dockerfile COPYs from `proxy/` and `common/`, so the build
        # context must be the repo root, not `proxy/` itself.
        run: docker build -t enb-proxy:ci -f proxy/Dockerfile .
      - name: Run proxy detached
        run: |
          docker run -d --name net7proxy-ci \
            -p 3801:3801 -p 3805:3805 -p 3500:3500 \
            enb-proxy:ci
      - name: Wait for proxy on tcp/3801
        run: |
          set -e
          for i in $(seq 1 30); do
            if timeout 1 bash -c '</dev/tcp/127.0.0.1/3801' 2>/dev/null; then
              echo "proxy ready after ${i}s"
              exit 0
            fi
            sleep 1
          done
          echo "proxy never came up; logs:"
          docker logs net7proxy-ci
          exit 1
      - name: Build tests
        run: |
          cmake -S tests -B build/tests -G Ninja
          cmake --build build/tests --target handshake_live_test replay_test -j"$(nproc)"
      - name: Run live ctest (proxy-only — handshake + reply path only)
        # NOTE: This job runs the proxy in isolation, with no MVAS / sector
        # server behind it. The Replay.LivePostHandshakeReplay test
        # therefore does NOT set NET7_TEST_REAL_MVAS, so its strict
        # response-opcode round-trip is skipped (with a warning). The
        # strict round-trip assertion runs in cli-integration-test below,
        # which brings up the full docker-compose stack.
        env:
          NET7_TEST_PROXY_HOST: 127.0.0.1
          NET7_TEST_PROXY_PORT: "3801"
        run: ctest --test-dir build/tests --output-on-failure -R 'HandshakeDriver|Replay'
      - name: Proxy logs (always)
        if: always()
        run: docker logs net7proxy-ci || true
      - name: Stop proxy
        if: always()
        run: docker rm -f net7proxy-ci || true

  cli-integration-test:
    name: cli-integration-test (xUnit / .NET 10 against full stack)
    runs-on: ubuntu-24.04
    # Independent of the C++ ctest pipeline — uses docker-compose stack
    # straight from the repo definitions, drives CliClient.Core in-
    # process, and asserts opcode-by-opcode against the running server.
    # No `needs:` chain so this runs in parallel with cmake-build /
    # ctest / integration-test for fast feedback.
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - name: Install .NET 10 SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
      - name: Generate self-signed dev TLS cert (justfile gen-certs)
        run: |
          mkdir -p deploy/certs
          openssl req -x509 -newkey rsa:2048 -days 365 -nodes \
            -subj "/CN=localhost/O=Earth-and-Beyond Emulator Dev/C=US" \
            -addext "subjectAltName=DNS:localhost,DNS:local.net-7.org,IP:127.0.0.1" \
            -keyout deploy/certs/localhost.pem \
            -out    deploy/certs/localhost.cer
      - name: Bring up docker-compose stack (mysql + login + proxy + server)
        run: |
          docker compose up -d --wait mysql login proxy server
          docker compose ps
      - name: Build CliClient.IntegrationTests
        run: |
          dotnet build tests/integration/CliClient.IntegrationTests/CliClient.IntegrationTests.csproj \
            --configuration Debug
      - name: Build + run C++ ctest with real MVAS behind the proxy
        # The integration-test job above can only verify the proxy's
        # reply path (its fallback ServerRedirect has the same opcode the
        # capture expected, so a round-trip assertion there is trivially
        # green). Here the full docker-compose stack is up, including
        # MVAS, so the proxy's UDPConnection::SendMasterLogin can reach
        # a real server and the strict response-opcode round-trip is
        # meaningful. Setting NET7_TEST_REAL_MVAS=1 enables that strict
        # assertion in tests/client/replay_test.cpp.
        env:
          NET7_TEST_PROXY_HOST: 127.0.0.1
          NET7_TEST_PROXY_PORT: "3801"
          NET7_TEST_REAL_MVAS: "1"
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            g++ cmake ninja-build pkg-config libssl-dev
          cmake -S tests -B build/tests -G Ninja
          cmake --build build/tests --target handshake_live_test replay_test -j"$(nproc)"
          ctest --test-dir build/tests --output-on-failure -R 'Replay\.LivePostHandshakeReplay'
      - name: Run integration suite
        env:
          # ServerFixture owns the lifecycle when we DON'T pass this.
          # We brought the stack up explicitly above so we DO set it —
          # fixture skips its own `compose up`/`down -v` and reuses
          # ours. This way the ServerFixture's `down -v` never wipes
          # the stack mid-job; we tear it down ourselves in a final
          # always-runs step that also collects logs.
          CLI_INTEGRATION_SKIP_COMPOSE: "1"
        run: |
          dotnet test tests/integration/CliClient.IntegrationTests/CliClient.IntegrationTests.csproj \
            --no-build \
            --logger "trx;LogFileName=cli-integration.trx" \
            --logger "console;verbosity=normal" \
            --results-directory test-results/
      - name: Upload TRX artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cli-integration-trx
          path: test-results/**/*.trx
          if-no-files-found: warn
      - name: Stack logs on failure
        if: failure()
        run: |
          echo "=== mysql ===";  docker compose logs mysql  || true
          echo "=== login ===";  docker compose logs login  || true
          echo "=== proxy ===";  docker compose logs proxy  || true
          echo "=== server ==="; docker compose logs server || true
      - name: Tear down docker-compose stack
        if: always()
        run: docker compose down -v || true
